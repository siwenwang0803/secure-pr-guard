name: Auto Label PR with GitHub App

on:
  pull_request:
    types: [opened, reopened]
  workflow_dispatch:

jobs:
  auto-label:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests pyjwt[crypto] cryptography
        
    - name: Create private key file
      run: |
        echo "${{ secrets.APP_PRIVATE_KEY }}" > private-key.pem
        chmod 600 private-key.pem
        
    - name: Test GitHub App Authentication
      env:
        GITHUB_APP_ID: ${{ secrets.APP_ID }}
        GITHUB_APP_INSTALLATION_ID: ${{ secrets.APP_INSTALLATION_ID }}
      run: |
        python - << 'EOF'
        import os
        import requests
        import jwt
        import time
        
        print("Testing GitHub App authentication...")
        
        # 简单测试
        app_id = os.getenv("GITHUB_APP_ID")
        installation_id = os.getenv("GITHUB_APP_INSTALLATION_ID")
        
        print(f"App ID: {app_id}")
        print(f"Installation ID: {installation_id}")
        
        if not app_id or not installation_id:
            print("❌ Missing secrets!")
            exit(1)
        else:
            print("✅ Secrets loaded successfully")
        EOF
